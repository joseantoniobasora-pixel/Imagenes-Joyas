<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>Mi Lista de Tareas</h1>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Agrega una nueva tarea..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Agregar</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="active">Activas</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="stats">
                <span id="todoCount">0 tareas</span>
                <button id="clearBtn" class="clear-btn">Limpiar Completadas</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
